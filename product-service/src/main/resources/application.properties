spring.application.name=product-service

server.port=8082

# ─── Spring Cloud Config Client ───────────────────────────────────────────────
# Pull shared/service-specific config from config-server at startup
# "optional:" means: if config-server is unreachable, use local properties (don't fail)
spring.config.import=optional:configserver:http://localhost:8888

# ─── Eureka Client — Service Discovery ────────────────────────────────────────
# Register with Eureka so other services (api-gateway, order-service) can find us by name
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# Instance metadata shown in Eureka dashboard
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.example.product_service

# ─── Spring Boot Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,loggers,metrics,mappings,beans
management.info.env.enabled=true
management.endpoint.health.show-details=always
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ─── /actuator/info ───────────────────────────────────────────────────────────
info.app.name=product-service
info.app.version=1.0.0
info.app.description=REST API for managing products in the e-commerce platform
info.app.author=Ankur Rana

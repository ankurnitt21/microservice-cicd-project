spring.application.name=eureka-server
server.port=8761

# ─── Eureka Server — don't register with itself ───────────────────────────────
# This IS the registry; it should not try to register with another registry
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Info ─────────────────────────────────────────────────────────────────────
management.info.env.enabled=true
info.app.name=Eureka Service Registry
info.app.description=Service discovery server for all microservices

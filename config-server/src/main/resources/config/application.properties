# ─── application.properties (shared — loaded by ALL services) ─────────────────
# Properties here are the defaults. Service-specific files override them.
# e.g. product-service.properties overrides these for product-service only.

# Actuator — expose same endpoints in all services
management.endpoints.web.exposure.include=health,info,loggers,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging — default level for all services
logging.level.root=INFO
logging.level.com.example=DEBUG

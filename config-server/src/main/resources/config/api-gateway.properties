# ─── api-gateway.properties ───────────────────────────────────────────────────
# These properties are served ONLY to api-gateway

info.app.name=api-gateway
info.app.version=1.0.0
info.app.description=API Gateway — single entry point routing to all microservices

# Override shared actuator config — gateway needs the gateway endpoint exposed
management.endpoints.web.exposure.include=health,info,loggers,metrics,gateway
management.endpoint.gateway.enabled=true

spring:
  application:
    name: config-server
  profiles:
    active: native   # Use classpath/filesystem as config backend (no Git repo needed)
  cloud:
    config:
      server:
        native:
          # Where config files live — classpath:/config means src/main/resources/config/
          search-locations: classpath:/config

server:
  port: 8888   # Standard Spring Cloud Config Server port

# ─── Eureka Client ────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Config Server
    description: Centralised configuration server for all microservices

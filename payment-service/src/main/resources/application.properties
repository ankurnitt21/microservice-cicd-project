spring.application.name=payment-service
server.port=8084

# ─── Spring Cloud Config Client ───────────────────────────────────────────────
spring.config.import=optional:configserver:http://localhost:8888

# ─── Eureka Client ────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ─── Kafka Consumer ───────────────────────────────────────────────────────────
# Bootstrap server — overridden to kafka:9092 in Docker via env var SPRING_KAFKA_BOOTSTRAP_SERVERS
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserializer for message key (String) and value (JSON → OrderPlacedEvent)
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Ignore the type header sent by the producer (order-service uses a different package name)
# Use this class as the target type instead
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.payment_service.event.OrderPlacedEvent

# Trust all packages for deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ─── /actuator/info ───────────────────────────────────────────────────────────
info.app.name=payment-service
info.app.version=1.0.0
info.app.description=Kafka consumer — processes payments for confirmed orders
info.app.author=Ankur Rana

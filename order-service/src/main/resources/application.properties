spring.application.name=order-service

server.port=8083

# ─── Spring Cloud Config Client ───────────────────────────────────────────────
# Pull shared/service-specific config from config-server on startup
# "optional:" means: don't fail if config-server is not running
spring.config.import=optional:configserver:http://localhost:8888

# ─── Eureka Client — Service Discovery ────────────────────────────────────────
# Register with Eureka so api-gateway can route to us
# Also needed so Feign can resolve "product-service" to a real host:port
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.packages-to-scan=com.example.order_service

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,loggers,metrics,circuitbreakerevents
management.endpoint.health.show-details=always
management.info.env.enabled=true
management.health.circuitbreakers.enabled=true

# ─── Resilience4j — Circuit Breaker ──────────────────────────────────────────
resilience4j.circuitbreaker.instances.productService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.productService.sliding-window-size=10
resilience4j.circuitbreaker.instances.productService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.productService.record-exceptions=java.lang.Exception

# ─── Resilience4j — Retry ─────────────────────────────────────────────────────
resilience4j.retry.instances.productService.max-attempts=3
resilience4j.retry.instances.productService.wait-duration=500ms
resilience4j.retry.instances.productService.retry-exceptions=java.io.IOException,feign.RetryableException
resilience4j.retry.instances.productService.ignore-exceptions=feign.FeignException$NotFound,com.example.order_service.exception.ProductNotAvailableException

# ─── Feign logging ────────────────────────────────────────────────────────────
feign.client.config.default.loggerLevel=BASIC
logging.level.com.example.order_service.client=DEBUG

# ─── Kafka Producer ───────────────────────────────────────────────────────────
# Bootstrap server — overridden to kafka:9092 in Docker via env var SPRING_KAFKA_BOOTSTRAP_SERVERS
spring.kafka.bootstrap-servers=localhost:9092

# Serializer for message key (String) and value (JSON — OrderPlacedEvent)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Do NOT add __TypeId__ header — payment-service uses its own class for deserialization
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ─── /actuator/info ───────────────────────────────────────────────────────────
info.app.name=order-service
info.app.version=1.0.0
info.app.description=Order management microservice — calls product-service via Feign + LoadBalancer
